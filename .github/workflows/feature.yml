name: Build SpendTracker Pro APK (Feature Branch)

on:
  # Run automatically on every push to a feature branch and on PRs targeting main.
  # This catches lint errors, failing tests, CVEs, and SAST findings before merge.
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  # Keep manual dispatch for on-demand builds (e.g. QA hand-off).
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    # contents:write is required by gradle/actions/dependency-submission to post
    # the dependency graph to GitHub's Security tab. Never available on fork PRs.
    permissions:
      contents: write

    env:
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      RELEASE_KEY_ALIAS: spendtracker
      VERSION_CODE: ${{ github.run_number }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Java 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.3.1
        with:
          cache-read-only: false

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Regenerate Gradle Wrapper JAR if missing
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            gradle wrapper --gradle-version 8.9 --distribution-type bin
          fi

      - name: Decode Keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/spendtracker.keystore
          echo "✅ Keystore decoded: $(wc -c < app/spendtracker.keystore) bytes"

      # ── Quality gates (match main build-apk.yml) ───────────────────────────
      - name: Generate lint baseline (first run only)
        run: |
          if [ ! -f app/lint-baseline.xml ]; then
            echo "No lint baseline found — generating one to capture existing issues"
            ./gradlew updateLintBaseline --no-daemon || true
          fi

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # Scans all Gradle dependencies against the GitHub Advisory Database (OSV).
      # Fails the build if any dependency has a known CVE with a fix available.
      # Skipped on pull_request — contents:write is never available for fork PRs.
      - name: Dependency vulnerability scan
        if: github.event_name != 'pull_request'
        uses: gradle/actions/dependency-submission@v4.3.1
        continue-on-error: true

      # Lightweight SAST — catches hardcoded secrets, SQL injection patterns,
      # and common Android security issues.
      # continue-on-error keeps the build green while the baseline is being cleaned;
      # remove it once findings are triaged to make this a hard gate.
      - name: SAST — Semgrep Android rules
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/android
            p/secrets
            p/owasp-top-ten
        continue-on-error: true
      # ──────────────────────────────────────────────────────────────────────

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Build Release AAB
        run: ./gradlew bundleRelease --stacktrace --no-daemon

      - name: Verify all artifacts exist
        run: |
          echo "=== Artifact check ==="
          test -f app/build/outputs/apk/debug/app-debug.apk \
            && echo "✅ Debug APK: $(du -sh app/build/outputs/apk/debug/app-debug.apk)" \
            || echo "❌ Debug APK missing"
          test -f app/build/outputs/apk/release/app-release.apk \
            && echo "✅ Release APK: $(du -sh app/build/outputs/apk/release/app-release.apk)" \
            || echo "❌ Release APK missing"
          test -f app/build/outputs/bundle/release/app-release.aab \
            && echo "✅ AAB: $(du -sh app/build/outputs/bundle/release/app-release.aab)" \
            || echo "❌ AAB missing"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: SpendTrackerPro-${{ github.ref_name }}-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload Release APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: SpendTrackerPro-${{ github.ref_name }}-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      - name: Upload AAB
        uses: actions/upload-artifact@v4.6.2
        with:
          name: SpendTrackerPro-${{ github.ref_name }}-AAB
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 14
