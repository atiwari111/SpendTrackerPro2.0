name: Build SpendTracker Pro APK (Feature Branch)

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      RELEASE_KEY_ALIAS: spendtracker
      VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Java 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.3.1
        with:
          cache-read-only: false

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Regenerate Gradle Wrapper JAR if missing
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            gradle wrapper --gradle-version 8.9 --distribution-type bin
          fi

      - name: Decode Keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/spendtracker.keystore
          echo "✅ Keystore decoded: $(wc -c < app/spendtracker.keystore) bytes"

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --stacktrace --no-daemon
          ls -lh app/build/outputs/apk/release/

      - name: Verify Release APK
        run: |
          test -f app/build/outputs/apk/release/app-release.apk \
            && echo "✅ Release APK ready: $(du -sh app/build/outputs/apk/release/app-release.apk)" \
            || (echo "❌ Release APK not found" && exit 1)

      - name: Upload Release APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: SpendTrackerPro-${{ github.ref_name }}-Release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14
