name: Build SpendTracker Pro APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Java setup
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Gradle setup — no gradle-version override; let the wrapper decide
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # Run lint
      - name: Run Android Lint
        run: ./gradlew lint

      # Run tests
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      # Build Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      # Build Play Store Bundle
      - name: Build Release AAB
        run: ./gradlew bundleRelease --stacktrace --no-daemon

      # Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SpendTrackerPro-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SpendTrackerPro-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # Upload Play Store AAB
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SpendTrackerPro-AAB
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
