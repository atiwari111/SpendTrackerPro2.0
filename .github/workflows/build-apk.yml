name: Build SpendTracker Pro APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Java 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.3.1
        with:
          cache-read-only: false

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Regenerate Gradle Wrapper JAR if missing
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar missing — regenerating..."
            gradle wrapper --gradle-version 8.9 --distribution-type bin
          fi

      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/spendtracker.keystore
            echo "✅ Keystore decoded ($(wc -c < app/spendtracker.keystore) bytes)"
          else
            echo "⚠️ KEYSTORE_BASE64 secret not set — release signing will fail"
          fi

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Build Release AAB
        run: ./gradlew bundleRelease --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: SpendTrackerPro-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: SpendTrackerPro-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4.6.2
        with:
          name: SpendTrackerPro-AAB
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
